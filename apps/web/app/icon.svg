<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Indigo rounded square background -->
  <rect width="32" height="32" rx="7" fill="#7C7CFF"/>

  <!-- Concentric arcs radiating from bottom-left origin (3, 29) -->
  <path d="M 10 29 A 7 7 0 0 1 3 22"
        fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M 17 29 A 14 14 0 0 1 3 15"
        fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M 24 29 A 21 21 0 0 1 3 8"
        fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Diagonal sweep line -->
  <line x1="3" y1="29" x2="23" y2="9"
        stroke="rgba(255,255,255,0.65)" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Blip dot (bright, where sweep crosses outer arc) -->
  <circle cx="17" cy="15" r="2.5" fill="white"/>
</svg>
